openapi: 3.0.3
info:
  title: Zepnest Admin REST API
  description: |
    JSON REST API under `/api` for the admin portal (customers, technicians, orders, services, catalog, subscriptions, payments).

    **Web auth (email/password):** ``POST /api/auth/register``, ``POST /api/auth/login``, ``GET /api/auth/me`` — JWT with ``typ: web_user``; use header ``Authorization: Bearer <accessToken>`` for ``/me``.

    GraphQL remains at `/graphql` (not included in this document).
  version: "1.0.0"

servers:
  - url: http://localhost:5002
    description: Default local (see `PORT` in `.env`)
  - url: /
    description: Same origin as this server

tags:
  - name: Auth
  - name: Customers
  - name: Technicians
  - name: Assets
  - name: Orders
  - name: Services
  - name: Catalog
  - name: Subscriptions
  - name: Enumerations
  - name: Dashboard
  - name: Payments
  - name: Settings

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register with email and password (web)
      description: |
        Stores a Werkzeug hash in ``users.password_hash``. New accounts are ``user_type=customer``.
        Email is normalized to lowercase.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8, description: Plain text; stored hashed }
                firstName: { type: string }
                lastName: { type: string }
      responses:
        "201":
          description: Created; JWT returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAuthSuccess"
        "400": { description: Validation error }
        "409": { description: Email already registered }

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password (web)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: JWT issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAuthSuccess"
        "400": { description: Missing fields }
        "401": { description: Invalid credentials or inactive user }

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Current user (web JWT)
      description: |
        Use **Authorize** with the ``accessToken`` from ``/api/auth/login`` or ``/api/auth/register``.
        Token payload includes ``typ: web_user`` (not the same as mobile OTP JWTs).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/WebAuthUser"
        "401": { description: Missing or invalid token }

  /api/customers:
    get:
      tags: [Customers]
      summary: List customers (paginated)
      description: |
        Uses `items` as the primary list key.
        Legacy `data` is not returned on this endpoint anymore.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: search
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [active, inactive] }
        - name: customerUserType
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema: { type: string, enum: [id, createdAt, updatedAt, firstName, lastName, email, phone] }
        - name: sortField
          in: query
          schema: { type: string, description: Alias for sortBy }
        - name: sortOrder
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
      responses:
        "200":
          description: Paginated list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaginatedCustomers" }
    post:
      tags: [Customers]
      summary: Create customer
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CustomerCreate" }
      responses:
        "201":
          description: Created
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/customers/{customer_id}:
    parameters:
      - name: customer_id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Customers]
      summary: Get customer by id
      responses:
        "200":
          description: Customer
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Customers]
      summary: Update customer
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }
    delete:
      tags: [Customers]
      summary: Delete customer
      responses:
        "204": { description: No content }

  /api/technicians:
    get:
      tags: [Technicians]
      summary: List technicians (paginated)
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: search
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated list
    post:
      tags: [Technicians]
      summary: Create technician
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        "201": { description: Created }

  /api/technicians/{technician_id}:
    parameters:
      - name: technician_id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Technicians]
      summary: Get technician
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Technicians]
      summary: Update technician
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }
    delete:
      tags: [Technicians]
      summary: Delete technician
      responses:
        "204": { description: No content }

  /api/assets:
    get:
      tags: [Assets]
      summary: List assets (derived from bookings in current schema)
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200": { description: OK }

  /api/assets/{asset_id}:
    parameters:
      - name: asset_id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Assets]
      summary: Get asset by id
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [Assets]
      summary: Create asset (may return 501 depending on schema)
      responses:
        "201": { description: Created }
        "501": { description: Not implemented }
    put:
      tags: [Assets]
      summary: Update asset
      responses:
        "200": { description: OK }
        "501": { description: Not implemented }
    delete:
      tags: [Assets]
      summary: Delete asset
      responses:
        "204": { description: No content }
        "501": { description: Not implemented }

  /api/orders:
    get:
      tags: [Orders]
      summary: List orders / bookings (paginated)
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: search
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: customerId
          in: query
          schema: { type: integer, description: Filter by users.user_id }
        - name: customer_id
          in: query
          schema: { type: integer, description: Legacy alias for customerId }
      responses:
        "200": { description: Paginated orders }
    post:
      tags: [Orders]
      summary: Create order (booking)
      description: |
        `customerId` or `customer_id` is required and must exist in `users`.
        `status` must match DB `booking_status_enum` if present (default from `BOOKING_STATUS_DEFAULT`).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrderCreate" }
            examples:
              minimal:
                value:
                  customerId: 5
              full:
                value:
                  orderNo: ORD-2026-001
                  customerId: 5
                  technicianId: null
                  address: 12 MG Road
                  status: pending
                  subtotal: 1500
                  discountAmount: 0
                  loyaltyPointsUsed: 0
                  totalAmount: 1500
                  loyaltyPointsEarned: 0
                  isSubscriptionBooking: false
                  customerNotes: Call before visit
      responses:
        "201":
          description: Created — includes message, id, orderNo, status
        "400":
          description: Missing or invalid customerId
        "404":
          description: Customer user not found

  /api/orders/{order_id}:
    parameters:
      - name: order_id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Orders]
      summary: Get order
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Orders]
      summary: Update order
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }
    delete:
      tags: [Orders]
      summary: Delete order
      responses:
        "204": { description: No content }

  /api/orders/assign/{order_id}:
    post:
      tags: [Orders]
      summary: Assign technician to order
      parameters:
        - name: order_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                technicianId: { type: integer, nullable: true }
      responses:
        "200": { description: OK }

  /api/orders/escalate/{order_id}:
    post:
      tags: [Orders]
      summary: Escalate order
      parameters:
        - name: order_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200": { description: OK }

  /api/services:
    get:
      tags: [Services]
      summary: List services
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: search
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200": { description: OK }
    post:
      tags: [Services]
      summary: Create service
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        "201": { description: Created }

  /api/services/{service_id}:
    parameters:
      - name: service_id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [Services]
      summary: Get service
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Services]
      summary: Update service
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }
    delete:
      tags: [Services]
      summary: Delete service
      responses:
        "204": { description: No content }

  /api/services/categories:
    get:
      tags: [Catalog]
      summary: List service categories (with subCategories when table exists)
      responses:
        "200": { description: OK }

  /api/catalog/subcategories:
    get:
      tags: [Catalog]
      summary: List subcategories (optional categoryId filter)
      parameters:
        - name: categoryId
          in: query
          schema: { type: integer }
      responses:
        "200": { description: OK }

  /api/services/addons:
    get:
      tags: [Services]
      summary: List add-ons (legacy / stub)
      responses:
        "200": { description: OK }

  /api/services/warranties:
    get:
      tags: [Services]
      summary: List warranties (legacy / stub)
      responses:
        "200": { description: OK }

  /api/services/packages:
    get:
      tags: [Services]
      summary: List packages (legacy / stub)
      responses:
        "200": { description: OK }

  /api/subscriptions/plans:
    get:
      tags: [Subscriptions]
      summary: List subscription plans
      responses:
        "200": { description: OK }
    post:
      tags: [Subscriptions]
      summary: Create subscription plan
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        "201": { description: Created }

  /api/subscriptions/plans/{plan_id}:
    parameters:
      - name: plan_id
        in: path
        required: true
        schema: { type: integer }
    put:
      tags: [Subscriptions]
      summary: Update subscription plan
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /api/subscriptions/user:
    get:
      tags: [Subscriptions]
      summary: User subscriptions listing
      responses:
        "200": { description: OK }

  /api/subscriptions/amc:
    get:
      tags: [Subscriptions]
      summary: AMC subscriptions
      responses:
        "200": { description: OK }

  /api/subscriptions/user-amc:
    get:
      tags: [Subscriptions]
      summary: User AMC listing
      responses:
        "200": { description: OK }

  /api/enumerations/specializations:
    get:
      tags: [Enumerations]
      summary: Technician specializations enum
      responses:
        "200": { description: OK }

  /api/enumerations/service-categories:
    get:
      tags: [Enumerations]
      summary: Service categories enum (from DB or legacy)
      responses:
        "200": { description: OK }

  /api/enumerations/zip-codes:
    get:
      tags: [Enumerations]
      summary: Zip codes from service_areas
      responses:
        "200": { description: OK }

  /api/enumerations/time-slots:
    get:
      tags: [Enumerations]
      summary: Active time slots from time_slot_master
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string, example: "1" }
                    timeSlot: { type: string, example: "07:30 - 08:00" }
                    active: { type: string, example: "Y" }

  /api/dashboard/stats:
    get:
      tags: [Dashboard]
      summary: Dashboard KPIs
      responses:
        "200": { description: OK }

  /api/payments:
    get:
      tags: [Payments]
      summary: List payments (paginated)
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: search
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200": { description: OK }

  /api/payments/{payment_id}:
    parameters:
      - name: payment_id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Payments]
      summary: Get payment
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/payments/payouts:
    get:
      tags: [Payments]
      summary: Payouts listing
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200": { description: OK }

  /api/payments/refunds:
    get:
      tags: [Payments]
      summary: Refunds listing
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200": { description: OK }

  /api/payments/refunds/{refund_id}:
    put:
      tags: [Payments]
      summary: Update refund status
      parameters:
        - name: refund_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /api/settings/roles:
    get:
      tags: [Settings]
      summary: RBAC roles list (static)
      responses:
        "200": { description: OK }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT from ``Authorization: Bearer <token>``. **Web:** ``accessToken`` from ``POST /api/auth/login`` or ``/api/auth/register`` (``typ: web_user``).
        **Mobile:** ``accessToken`` from ``POST /mobile/auth/verify-otp`` (``typ: mobile_customer``).

  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    Limit:
      name: limit
      in: query
      schema: { type: integer, default: 10, minimum: 1 }

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorMessage" }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorMessage" }

  schemas:
    ErrorMessage:
      type: object
      properties:
        message: { type: string }

    WebAuthUser:
      type: object
      properties:
        id: { type: integer, description: users.user_id }
        email: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        role: { type: string, description: Alias of userType for web frontend compatibility }
        userType: { type: string }

    WebAuthSuccess:
      type: object
      properties:
        accessToken: { type: string, description: JWT; typ web_user }
        expiresInHours: { type: integer }
        user:
          $ref: "#/components/schemas/WebAuthUser"

    OrderCreate:
      type: object
      required: []
      description: At least one of customerId or customer_id must be present for NOT NULL DB constraints.
      properties:
        orderNo: { type: string }
        customerId: { type: integer, description: users.user_id }
        customer_id: { type: integer }
        technicianId: { type: integer, nullable: true }
        technician_id: { type: integer, nullable: true }
        address: { type: string }
        status: { type: string }
        subtotal: { type: number }
        discountAmount: { type: number }
        loyaltyPointsUsed: { type: integer }
        totalAmount: { type: number }
        loyaltyPointsEarned: { type: integer }
        isSubscriptionBooking: { type: boolean }
        customerNotes: { type: string }

    CustomerCreate:
      type: object
      properties:
        email: { type: string }
        phone: { type: string }
        firstName: { type: string }
        lastName: { type: string }

    PaginatedCustomers:
      type: object
      properties:
        items: { type: array, items: { type: object } }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        totalPages: { type: integer }
