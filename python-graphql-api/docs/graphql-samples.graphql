# =============================================================================
# Zepnest API — sample GraphQL operations (matches api/graphql/schema.py)
# POST http://localhost:<PORT>/graphql  Content-Type: application/json
# Body: { "query": "...", "variables": { ... } }
# Field names are camelCase (Graphene).
# =============================================================================

# ---------------------------------------------------------------------------
# INTROSPECTION (optional — GraphiQL does this automatically)
# ---------------------------------------------------------------------------

query SchemaOverview {
  __schema {
    queryType { name }
    mutationType { name }
  }
}

query ListQueryFields {
  __type(name: "Query") {
    fields {
      name
      args {
        name
        type {
          name
          kind
          ofType {
            name
            kind
          }
        }
      }
    }
  }
}

query ListMutationFields {
  __type(name: "Mutation") {
    fields {
      name
      args {
        name
        type {
          name
          kind
          ofType {
            name
            kind
          }
        }
      }
    }
  }
}

# ---------------------------------------------------------------------------
# USERS & POSTS
# ---------------------------------------------------------------------------

query Users {
  users {
    id
    userId
    firstName
    lastName
    name
    email
    phone
    userType
    loyaltyPoints
    isActive
    createdAt
    updatedAt
  }
}

query User($id: Int!) {
  user(id: $id) {
    id
    firstName
    lastName
    email
    phone
